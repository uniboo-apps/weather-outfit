name: Deploy to Cloudflare Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 開発用ファイル（会話ログ・エージェント指示・md 等）を本番へ公開しない。
      # .assetsignore は `wrangler pages deploy` では無視されるため物理削除する
      # （2026-07-06 の Pages 開発ファイル公開レビューに合わせて統一）。
      - name: Strip non-public files from deploy
        run: rm -rf .github *.md .gitignore .assetsignore

      - name: Create project if missing & deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3441724797f692af21f432e8625165d9
          NAME: ${{ github.event.repository.name }}
        run: |
          npx -y wrangler@4 pages project create "$NAME" --production-branch=main || true
          npx -y wrangler@4 pages deploy . --project-name="$NAME" --branch=main --commit-dirty=true