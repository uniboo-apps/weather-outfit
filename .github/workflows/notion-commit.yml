name: Log commits to Notion

on:
  push:
    branches: [main, master]

jobs:
  log-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Send commits to Notion
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_COMMITS_DB_ID: ${{ vars.NOTION_COMMITS_DB_ID }}
          NOTION_APP_PAGE_ID: ${{ vars.NOTION_APP_PAGE_ID }}
        with:
          script: |
            const token = process.env.NOTION_TOKEN;
            const dbId = process.env.NOTION_COMMITS_DB_ID;
            const appId = process.env.NOTION_APP_PAGE_ID;
            if (!token || !dbId) {
              core.setFailed('NOTION_TOKEN or NOTION_COMMITS_DB_ID is not set');
              return;
            }
            const notionHeaders = {
              'Authorization': `Bearer ${token}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json',
            };
            // Translate commit message to Japanese via free Google endpoint (no key, no LLM tokens).
            // sl=auto so messages already in Japanese pass through unchanged. Falls back to original on any error.
            async function toJa(text) {
              try {
                const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=' + encodeURIComponent(text);
                const r = await fetch(url);
                if (!r.ok) { core.warning('translate HTTP ' + r.status); return text; }
                const data = await r.json();
                const ja = (data[0] || []).map(seg => seg[0]).join('');
                return ja || text;
              } catch (e) {
                core.warning('translate failed: ' + e);
                return text;
              }
            }
            const repo = context.repo.repo;
            const commits = context.payload.commits || [];
            core.info(`Sending ${commits.length} commit(s) to Notion`);
            for (const c of commits) {
              const en = ((c.message || '').split('\n')[0] || c.id).slice(0, 200);
              const ja = (await toJa(en)).slice(0, 200);
              const props = {
                "名前":   { title: [{ text: { content: ja } }] },
                "原文":   { rich_text: [{ text: { content: en } }] },
                "SHA":    { rich_text: [{ text: { content: c.id.slice(0, 7) } }] },
                "Author": { rich_text: [{ text: { content: (c.author && c.author.name) || '' } }] },
                "Date":   { date: { start: c.timestamp } },
                "URL":    { url: c.url },
                "Repo":   { rich_text: [{ text: { content: repo } }] },
              };
              if (appId) props["App"] = { relation: [{ id: appId }] };
              const resp = await fetch('https://api.notion.com/v1/pages', {
                method: 'POST',
                headers: notionHeaders,
                body: JSON.stringify({ parent: { database_id: dbId }, properties: props }),
              });
              if (!resp.ok) {
                core.warning(`Notion API failed for ${c.id.slice(0, 7)}: ${resp.status} ${await resp.text()}`);
              } else {
                core.info(`Logged ${c.id.slice(0, 7)}: ${ja}`);
              }
            }
            // Reorder this app's relation so newest commits appear at the top (self-healing each push).
            // Notion shows relation items in stored order; new links append at the bottom, so we rewrite
            // the order to Date-descending. Skip if >100 to avoid the relation write cap unlinking old rows.
            if (appId) {
              try {
                const ids = [];
                let cursor = undefined, more = true;
                while (more) {
                  const qb = {
                    filter: { property: "App", relation: { contains: appId } },
                    sorts: [{ property: "Date", direction: "descending" }],
                    page_size: 100,
                  };
                  if (cursor) qb.start_cursor = cursor;
                  const qr = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                    method: 'POST', headers: notionHeaders, body: JSON.stringify(qb),
                  });
                  if (!qr.ok) { core.warning('reorder query failed: ' + qr.status); break; }
                  const qj = await qr.json();
                  for (const pg of (qj.results || [])) ids.push(pg.id);
                  more = qj.has_more; cursor = qj.next_cursor;
                }
                if (ids.length > 0 && ids.length <= 100) {
                  const pr = await fetch(`https://api.notion.com/v1/pages/${appId}`, {
                    method: 'PATCH', headers: notionHeaders,
                    body: JSON.stringify({ properties: { "Related to コミットDB (App)": { relation: ids.map(id => ({ id })) } } }),
                  });
                  if (!pr.ok) core.warning('reorder patch failed: ' + pr.status + ' ' + await pr.text());
                  else core.info(`Reordered ${ids.length} relation(s) newest-first`);
                } else if (ids.length > 100) {
                  core.info('skip reorder: >100 commits (write cap)');
                }
              } catch (e) {
                core.warning('reorder failed: ' + e);
              }
            }
