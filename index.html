<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4a90d9">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="/styles.css">
<title>きょうの服装ナビ</title>
</head>
<body>
<div class="wrap">
  <header>
    <h1>👕 きょうの服装ナビ</h1>
    <div class="place" id="place">現在地を取得中…</div>
  </header>

  <div class="body-toggle" id="bodyToggle">
    <button data-off="-3">🥶 寒がり</button>
    <button data-off="0" class="on">標準</button>
    <button data-off="3">🥵 暑がり</button>
  </div>

  <div class="search" id="searchBox">
    <input id="cityInput" placeholder="都市名（例: 名古屋市 / Nagoya）" autocomplete="off">
    <button id="cityBtn">検索</button>
  </div>

  <div class="candidates" id="candidates"></div>

  <div id="content"></div>

  <div id="status" class="status">📍 位置情報を許可すると、お住まいの地域の予報を表示します。</div>

  <button class="btn ghost reload" id="manualBtn">📍 GPSが使えない時は都市名で検索</button>

  <footer>気象データ: Open-Meteo（無料・APIキー不要）／体感温度ベースで判定</footer>
</div>

<script src="/app.js" defer></script>
</body>
</html>
