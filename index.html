<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>きょうの服装ナビ</title>
<style>
  :root{
    --bg1:#eaf3fb; --bg2:#f7fbff; --card:#ffffff; --ink:#1f2d3d;
    --sub:#6b7c8f; --accent:#4a90d9; --warn:#e8833a; --rain:#3a8ec9;
    --line:#e3ecf4; --shadow:0 6px 20px rgba(40,80,130,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
    color:var(--ink);
    background:linear-gradient(165deg,var(--bg1),var(--bg2));
    min-height:100vh; line-height:1.5;
    padding:env(safe-area-inset-top) 12px 20px;
  }
  .wrap{max-width:560px;margin:0 auto;}
  header{padding:10px 4px 4px;text-align:center;}
  header h1{font-size:1.15rem;margin:0;letter-spacing:.02em;}
  header .place{color:var(--sub);font-size:.85rem;margin-top:2px;min-height:1.1em;}

  /* 体質トグル */
  .body-toggle{display:flex;gap:6px;background:#dde9f4;border-radius:12px;padding:4px;margin:8px 0;}
  .body-toggle button{
    flex:1;border:0;background:transparent;border-radius:9px;padding:7px 4px;
    font-size:.85rem;color:var(--sub);font-weight:600;cursor:pointer;transition:.2s;
  }
  .body-toggle button.on{background:var(--card);color:var(--accent);box-shadow:var(--shadow);}

  /* 日カード */
  .day{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:14px 14px;margin-bottom:12px;border:1px solid var(--line);}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px;}
  .day-title{font-size:1.02rem;font-weight:700;}
  .day-temp{font-size:.92rem;color:var(--sub);}
  .day-temp b{color:var(--warn);}
  .day-temp i{color:var(--accent);font-style:normal;}

  .main-advice{display:flex;align-items:center;gap:12px;margin:6px 0 2px;}
  .main-emoji{font-size:2.3rem;line-height:1;}
  .main-text{font-size:1.1rem;font-weight:700;}
  .main-text small{display:block;font-size:.8rem;font-weight:500;color:var(--sub);margin-top:1px;line-height:1.35;}

  /* 時間帯 */
  .slots{display:flex;gap:8px;margin:10px 0 4px;}
  .slot{flex:1;background:#f4f8fc;border-radius:13px;padding:8px 6px;text-align:center;border:1px solid var(--line);}
  .slot .label{font-size:.76rem;color:var(--sub);}
  .slot .emoji{font-size:1.5rem;margin:1px 0;}
  .slot .t{font-weight:700;font-size:.98rem;}
  .slot .wear{font-size:.72rem;color:var(--sub);margin-top:1px;line-height:1.25;}

  /* 時間別気温（横スクロール） */
  .hourly-wrap{margin-top:10px;}
  .hourly-label{font-size:.8rem;color:var(--sub);font-weight:600;margin-bottom:6px;}
  .hourly{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}
  .hourly::-webkit-scrollbar{height:5px;}
  .hourly::-webkit-scrollbar-thumb{background:#cdddec;border-radius:3px;}
  .hr{flex:0 0 auto;min-width:46px;text-align:center;background:#f4f8fc;border:1px solid var(--line);
    border-radius:10px;padding:6px 4px;}
  .hr .h{font-size:.72rem;color:var(--sub);}
  .hr .e{font-size:1.05rem;margin:1px 0;}
  .hr .tp{font-weight:700;font-size:.95rem;}
  .hr .pp{font-size:.66rem;color:var(--rain);min-height:.9em;font-weight:600;}
  .hr .pp.dry{color:#aab8c5;font-weight:500;}
  .hr .mm{font-size:.62rem;color:#2b6fa0;min-height:.85em;font-weight:600;}
  .hr.now{background:#e4f1fa;border-color:var(--accent);}

  /* 注意タグ */
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;font-weight:600;padding:6px 10px;border-radius:10px;}
  .tag.rain{background:#e4f1fa;color:var(--rain);}
  .tag.uv{background:#fdf0e3;color:var(--warn);}
  .tag.gap{background:#eee6fb;color:#7d5bd0;}
  .tag.dry{background:#eaf2ea;color:#5a9367;}

  .btn{display:block;width:100%;border:0;border-radius:14px;padding:14px;font-size:1rem;font-weight:700;
    background:var(--accent);color:#fff;cursor:pointer;box-shadow:var(--shadow);}
  .btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--accent);}
  .search{display:none;gap:8px;margin:10px 0;}
  .search input{flex:1;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:1rem;}
  .search button{border:0;background:var(--accent);color:#fff;border-radius:12px;padding:0 16px;font-weight:700;cursor:pointer;}
  .status{text-align:center;color:var(--sub);padding:30px 10px;}
  .err{color:#c0392b;}
  footer{text-align:center;color:var(--sub);font-size:.72rem;margin-top:10px;}
  .reload{margin-top:6px;}
  @media(max-width:360px){ .main-text{font-size:1rem;} .slot .wear{display:none;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>👕 きょうの服装ナビ</h1>
    <div class="place" id="place">現在地を取得中…</div>
  </header>

  <div class="body-toggle" id="bodyToggle">
    <button data-off="-3">🥶 寒がり</button>
    <button data-off="0" class="on">標準</button>
    <button data-off="3">🥵 暑がり</button>
  </div>

  <div class="search" id="searchBox">
    <input id="cityInput" placeholder="都市名（例: 名古屋市 / Nagoya）" autocomplete="off">
    <button id="cityBtn">検索</button>
  </div>

  <div id="content"></div>

  <div id="status" class="status">📍 位置情報を許可すると、お住まいの地域の予報を表示します。</div>

  <button class="btn ghost reload" id="manualBtn">📍 GPSが使えない時は都市名で検索</button>

  <footer>気象データ: Open-Meteo（無料・APIキー不要）／体感温度ベースで判定</footer>
</div>

<script>
"use strict";

// ===== 状態 =====
let bodyOffset = 0;        // 体質補正(℃): 寒がり-3 / 標準0 / 暑がり+3
let lastData = null;       // 直近の取得データ（体質切替時に再描画）
let coords = null;

// ===== 服装ロジック（体感温度 + 体質補正で判定）=====
// adj = 体感温度 + bodyOffset。寒がりは offset を引く=より寒く感じる前提で暖かめ提案。
function outfit(apparent){
  const t = apparent + bodyOffset;
  if (t < 5)  return {emoji:"🧥🧣", wear:"厚手コート＋防寒小物", short:"厚手コート", level:"凍える寒さ", detail:"ダウン・マフラー・手袋まで。しっかり防寒を。"};
  if (t < 12) return {emoji:"🧥",   wear:"冬コート",            short:"冬コート",   level:"寒い",       detail:"コートやダウンが必要。中はニットで。"};
  if (t < 16) return {emoji:"🧥👕", wear:"ジャケット",          short:"ジャケット", level:"肌寒い",     detail:"ジャケットや厚手の長袖が安心。"};
  if (t < 20) return {emoji:"👕🧥", wear:"長袖＋薄い羽織り",    short:"長袖＋羽織り",level:"少しひんやり",detail:"長袖シャツに、カーディガンなど薄手の羽織りを。"};
  if (t < 24) return {emoji:"👕",   wear:"長袖シャツ1枚",       short:"長袖1枚",    level:"ちょうどいい",detail:"長袖シャツ1枚で快適。羽織りは不要。"};
  if (t < 28) return {emoji:"👕☀️", wear:"半袖シャツ",          short:"半袖",       level:"あたたかい", detail:"半袖でOK。冷房対策に薄手の羽織りがあると安心。"};
  return            {emoji:"🥵🥤", wear:"半袖＋暑さ対策",      short:"半袖+対策",  level:"真夏の暑さ", detail:"通気性のいい半袖で。帽子・水分補給など熱中症対策を。"};
}
// （旧ロジック互換のためのダミー：絵文字はそのまま返す）
function fixEmoji(o){ return o; }

// ===== 取得 =====
async function loadByCoords(lat, lon){
  coords = {lat, lon};
  setStatus("天気を取得中…");
  reverseGeocode(lat, lon);
  const url = "https://api.open-meteo.com/v1/forecast"
    + "?latitude="+lat+"&longitude="+lon
    + "&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,uv_index"
    + "&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,uv_index_max"
    + "&timezone=auto&forecast_days=2";
  try{
    const r = await fetch(url);
    if(!r.ok) throw new Error("HTTP "+r.status);
    lastData = await r.json();
    render();
    hideStatus();
  }catch(e){
    setStatus("天気の取得に失敗しました（"+e.message+"）。時間をおいて再試行してください。", true);
  }
}

async function reverseGeocode(lat, lon){
  try{
    const r = await fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=ja");
    const j = await r.json();
    const name = [j.principalSubdivision, j.city || j.locality].filter(Boolean).join(" ");
    document.getElementById("place").textContent = name || ("緯度"+lat.toFixed(2)+" / 経度"+lon.toFixed(2));
  }catch(_){
    document.getElementById("place").textContent = "緯度"+lat.toFixed(2)+" / 経度"+lon.toFixed(2);
  }
}

async function loadByCity(q){
  setStatus("「"+q+"」を検索中…");
  try{
    const r = await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=1&language=ja");
    const j = await r.json();
    if(!j.results || !j.results.length){ setStatus("「"+q+"」が見つかりませんでした。", true); return; }
    const g = j.results[0];
    document.getElementById("place").textContent = [g.admin1, g.name].filter(Boolean).join(" ");
    await loadByCoords(g.latitude, g.longitude);
    document.getElementById("place").textContent = [g.admin1, g.name].filter(Boolean).join(" "); // 上書き保持
  }catch(e){
    setStatus("検索に失敗しました（"+e.message+"）", true);
  }
}

// ===== 描画 =====
function dayName(offset){ return offset===0 ? "今日" : "明日"; }

function avgAt(times, vals, dateStr, hours){
  let s=0,n=0;
  for(let i=0;i<times.length;i++){
    if(times[i].slice(0,10)!==dateStr) continue;
    const h = parseInt(times[i].slice(11,13),10);
    if(hours.includes(h)){ s+=vals[i]; n++; }
  }
  return n? s/n : null;
}

// 天気アイコン（降水確率と気温からざっくり）
function hourEmoji(pp, temp){
  if(pp!=null && pp>=60) return "🌧️";
  if(pp!=null && pp>=30) return "🌦️";
  if(temp!=null && temp>=28) return "☀️";
  return "🌤️";
}

// 指定日の時間別配列（今日は現在時刻以降のみ）
function hourlyFor(d, dateStr, isToday){
  const nowH = new Date().getHours();
  const out = [];
  for(let i=0;i<d.hourly.time.length;i++){
    const t = d.hourly.time[i];
    if(t.slice(0,10)!==dateStr) continue;
    const h = parseInt(t.slice(11,13),10);
    if(isToday && h < nowH) continue;
    out.push({
      h:h,
      temp:d.hourly.temperature_2m[i],
      pp:d.hourly.precipitation_probability ? d.hourly.precipitation_probability[i] : null,
      mm:d.hourly.precipitation ? d.hourly.precipitation[i] : null,
      now: isToday && h===nowH
    });
  }
  return out;
}

function render(){
  if(!lastData) return;
  const d = lastData;
  const dates = d.daily.time; // 2日分
  let html = "";
  for(let k=0;k<dates.length && k<2;k++){
    const date = dates[k];
    const max = d.daily.temperature_2m_max[k];
    const min = d.daily.temperature_2m_min[k];
    const popMax = d.daily.precipitation_probability_max[k];
    const rainSum = d.daily.precipitation_sum ? d.daily.precipitation_sum[k] : null;
    const uvMax = d.daily.uv_index_max[k];
    const gap = max - min;

    // 時間帯（朝7-9 / 昼12-14 / 夜19-21）の体感温度
    const slots = [
      {label:"朝", hours:[6,7,8,9]},
      {label:"昼", hours:[12,13,14]},
      {label:"夜", hours:[18,19,20,21]}
    ].map(s=>{
      const ap = avgAt(d.hourly.time, d.hourly.apparent_temperature, date, s.hours);
      return {label:s.label, ap:ap, o: ap!=null? fixEmoji(outfit(ap)) : null};
    });

    // メイン提案 = 日中(昼)基準、無ければ最高気温体感の近似
    const mainAp = slots[1].ap!=null ? slots[1].ap : (max+min)/2;
    const main = fixEmoji(outfit(mainAp));

    // タグ
    let tags = "";
    const rainMm = (rainSum!=null && rainSum>=0.1) ? ' / '+rainSum.toFixed(1)+'mm' : '';
    if(popMax!=null && popMax>=50) tags += '<span class="tag rain">☔ 傘がいる（降水確率'+Math.round(popMax)+'%'+rainMm+'）</span>';
    else if(popMax!=null && popMax>=30) tags += '<span class="tag rain">🌂 折りたたみ傘が安心（'+Math.round(popMax)+'%'+rainMm+'）</span>';
    else if(rainSum!=null && rainSum>=0.5) tags += '<span class="tag rain">🌂 にわか雨に注意（'+rainSum.toFixed(1)+'mm）</span>';
    else tags += '<span class="tag dry">☀️ 降水なし（最大'+(popMax!=null?Math.round(popMax):0)+'%）傘は不要</span>';
    if(uvMax!=null && uvMax>=6) tags += '<span class="tag uv">🧢 UV強い（指数'+uvMax.toFixed(0)+'）日焼け対策を</span>';
    else if(uvMax!=null && uvMax>=3) tags += '<span class="tag uv">😎 日差しあり（UV'+uvMax.toFixed(0)+'）</span>';
    if(gap>=8) tags += '<span class="tag gap">🌗 昼夜の差'+gap.toFixed(0)+'℃ 羽織り持参を</span>';

    html += '<div class="day">'
      + '<div class="day-head"><span class="day-title">'+dayName(k)+'</span>'
      + '<span class="day-temp">最高<b>'+max.toFixed(0)+'℃</b> / 最低<i>'+min.toFixed(0)+'℃</i></span></div>'
      + '<div class="main-advice"><div class="main-emoji">'+main.emoji+'</div>'
      + '<div class="main-text">'+main.wear+'<small>'+main.detail+'</small></div></div>'
      + '<div class="slots">'
      + slots.map(s=> '<div class="slot"><div class="label">'+s.label+'</div>'
          + '<div class="emoji">'+(s.o?s.o.emoji:'–')+'</div>'
          + '<div class="t">'+(s.ap!=null?s.ap.toFixed(0)+'℃':'–')+'</div>'
          + '<div class="wear">'+(s.o?s.o.short:'')+'</div></div>').join('')
      + '</div>';

    // 時間別の気温（横スクロール）
    const hours = hourlyFor(d, date, k===0);
    if(hours.length){
      html += '<div class="hourly-wrap"><div class="hourly-label">⏱ 時間別の気温・降水</div><div class="hourly">'
        + hours.map(h=> '<div class="hr'+(h.now?' now':'')+'">'
            + '<div class="h">'+(h.now?'今':h.h+'時')+'</div>'
            + '<div class="e">'+hourEmoji(h.pp,h.temp)+'</div>'
            + '<div class="tp">'+(h.temp!=null?h.temp.toFixed(0)+'°':'–')+'</div>'
            + '<div class="pp'+(h.pp!=null&&h.pp>=10?'':' dry')+'">'+(h.pp!=null?(h.pp>=10?'☔':'💧')+Math.round(h.pp)+'%':'')+'</div>'
            + '<div class="mm">'+(h.mm!=null && h.mm>=0.1?h.mm.toFixed(1)+'mm':'')+'</div>'
            + '</div>').join('')
        + '</div></div>';
    }

    if(tags) html += '<div class="tags">'+tags+'</div>';

    html += '</div>';
  }
  document.getElementById("content").innerHTML = html;
}

// ===== UI制御 =====
function setStatus(msg, isErr){
  const s=document.getElementById("status");
  s.style.display="block"; s.innerHTML=msg; s.className="status"+(isErr?" err":"");
}
function hideStatus(){ document.getElementById("status").style.display="none"; }

document.getElementById("bodyToggle").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  [...document.querySelectorAll("#bodyToggle button")].forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  bodyOffset = parseInt(b.dataset.off,10);
  localStorage.setItem("bodyOffset", bodyOffset);
  render();
});

document.getElementById("manualBtn").addEventListener("click", ()=>{
  const sb=document.getElementById("searchBox");
  sb.style.display = sb.style.display==="flex" ? "none" : "flex";
});
document.getElementById("cityBtn").addEventListener("click", ()=>{
  const q=document.getElementById("cityInput").value.trim();
  if(q) loadByCity(q);
});
document.getElementById("cityInput").addEventListener("keydown", e=>{
  if(e.key==="Enter"){ const q=e.target.value.trim(); if(q) loadByCity(q); }
});

// ===== 起動 =====
(function init(){
  const saved = localStorage.getItem("bodyOffset");
  if(saved!==null){
    bodyOffset = parseInt(saved,10);
    [...document.querySelectorAll("#bodyToggle button")].forEach(x=>{
      x.classList.toggle("on", parseInt(x.dataset.off,10)===bodyOffset);
    });
  }
  if(!navigator.geolocation){
    setStatus("この端末は位置情報に未対応です。都市名で検索してください。", true);
    document.getElementById("searchBox").style.display="flex";
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=> loadByCoords(pos.coords.latitude, pos.coords.longitude),
    err=>{
      setStatus("位置情報を取得できませんでした（"+err.message+"）。下のボタンから都市名で検索してください。", true);
      document.getElementById("searchBox").style.display="flex";
    },
    {enableHighAccuracy:false, timeout:8000, maximumAge:600000}
  );
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
